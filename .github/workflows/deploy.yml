# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["change_ts", "main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run fetch-notion
      - name: Build with Next.js
        env:
          BASE_PATH: ${{ vars.USE_ROOT_BASE_PATH == 'true' && 'ROOT' || format('/{0}', github.event.repository.name) }}
          ADSENSE_ACCOUNT: ${{ vars.ADSENSE_ACCOUNT }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run build:no-fetch
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  sync:
    environment:
      name: github-pages
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate configuration
        env:
          TARGET_REPO: ${{ vars.TARGET_REPO }}
          TARGET_REPO_PAT: ${{ secrets.COMMERCIAL_REPO_PAT }}
        run: |
          test -n "$TARGET_REPO" || {
            echo "::error::TARGET_REPO is missing"
            exit 1
          }

          test -n "$TARGET_REPO_PAT" || {
            echo "::error::COMMERCIAL_REPO_PAT is missing"
            exit 1
          }
      - name: Push to target repository
        env:
          TARGET_REPO: ${{ vars.TARGET_REPO }}
          TARGET_REPO_PAT: ${{ secrets.COMMERCIAL_REPO_PAT }}
        run: |
          git remote add commercial \
            "https://x-access-token:${TARGET_REPO_PAT}@github.com/${{ github.repository_owner }}/${TARGET_REPO}.git"

          git push commercial HEAD:main --force
name: Fetch Notion Data

on:
  schedule:
    - cron: "0 * * * *"  # 매 시간 정각마다 실행
  workflow_dispatch:     # 수동 실행 허용

permissions:
  contents: write 
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 패키지 매니저 동적 감지
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi
          
      # 2. Node.js 설정 (캐시 종류도 동적으로 바인딩)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      # 3. 감지된 패키지 매니저 명령어에 맞춰 의존성 설치 (npm ci 또는 yarn install)
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      # 4. 동적 매니저로 스크립트 실행 및 환경 변수 주입
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run fetch-notion

      # 5. 데이터 변경 시 자동 커밋 및 푸시
      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 로컬에서 .gitignore 상태인 json 파일을 강제로 스테이징
          git add -f src/data/education.json
          
          if git diff --staged --quiet; then
            echo "No changes detected in Notion database."
          else
            echo "Changes detected in Notion database. Committing and pushing..."
            git commit -m "chore: auto-sync education log from Notion"
            git push
          fi
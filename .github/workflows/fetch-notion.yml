name: Fetch Notion Data and Deploy

on:
  schedule:
    - cron: "35 * * * *"  # 매 시간 정각마다 실행
  workflow_dispatch:     # 수동 실행 허용

permissions:
  contents: read         # 소스코드는 읽기 권한만 필요
  pages: write           # Pages 배포를 위해 필수
  id-token: write        # OIDC 인증을 위해 필수

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 패키지 매니저 동적 감지
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      # 3. 의존성 설치
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      # 4. 노션 데이터 동적 Fetch 및 실시간 저장 (src/data/education.json 생성)
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run fetch-notion

      # 5. 프로젝트 빌드 (위에서 생성된 education.json을 포함하여 빌드됨)
      - name: Build project
        env:
          BASE_PATH: ${{ vars.USE_ROOT_BASE_PATH == 'true' && 'ROOT' || format('/{0}', github.event.repository.name) }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run build:no-fetch

      # 6. 빌드 결과물 업로드 (배포 전 아티팩트화)
      # ※ 만약 빌드 결과물 폴더가 dist가 아니라 build 또는 out 이라면 아래 path를 수정하세요.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      # 7. GitHub Pages에 실시간 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
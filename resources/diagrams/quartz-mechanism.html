<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 320px;
        }
        .canvas-container {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="canvas1" width="700" height="260"></canvas>
    </div>

    <script>
        const drawCanvas = () => {
            const c = document.getElementById('canvas1');
            const ctx = c.getContext('2d');
            
            // Title
            ctx.font = 'bold 18px Inter, Arial';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('Spring Scheduler vs Quartz Scheduler', 20, 30);
            ctx.font = '13px Inter';
            ctx.fillStyle = '#888';
            ctx.fillText('Time-based Execution Mechanism Comparison', 20, 52);

            // Spring Side
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(30, 70, 300, 170);
            ctx.setLineDash([]);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '600 13px Inter';
            ctx.fillText("Spring Scheduler (Local)", 40, 90);

            // Box: Memory
            ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(60, 105, 240, 40, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#38bdf8';
            ctx.font = '13px Inter';
            ctx.fillText("Internal Memory (RAM)", 110, 130);

            // Arrow down
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(180, 145); ctx.lineTo(180, 170); ctx.stroke();
            // Arrow head
            ctx.beginPath(); ctx.moveTo(180, 170); ctx.lineTo(176, 163); ctx.lineTo(184, 163); ctx.fill();
            
            // Execute box
            ctx.fillStyle = 'rgba(56, 189, 248, 0.05)';
            ctx.strokeStyle = '#475569';
            ctx.beginPath(); ctx.roundRect(110, 175, 140, 35, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px Inter';
            ctx.fillText("Execute (Cron)", 140, 197);

            // Warning icon
            ctx.fillStyle = '#f97316';
            ctx.font = '11px Inter';
            ctx.fillText("⚠ 중복 실행 위험", 120, 225);

            // Quartz Side
            ctx.strokeStyle = '#64748b';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(370, 70, 300, 170);
            ctx.setLineDash([]);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '600 13px Inter';
            ctx.fillText("Quartz Scheduler (DB Persistence)", 380, 90);

            // Box: JDBC JobStore
            ctx.fillStyle = 'rgba(168, 85, 247, 0.1)';
            ctx.strokeStyle = '#a855f7';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(400, 105, 240, 40, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#a855f7';
            ctx.font = '13px Inter';
            ctx.fillText("JDBC JobStore (Shared DB)", 435, 130);

            // Arrow down
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(520, 145); ctx.lineTo(520, 170); ctx.stroke();
            ctx.beginPath(); ctx.fillStyle = '#64748b'; ctx.moveTo(520, 170); ctx.lineTo(516, 163); ctx.lineTo(524, 163); ctx.fill();

            // Execute box
            ctx.fillStyle = 'rgba(168, 85, 247, 0.05)';
            ctx.strokeStyle = '#475569';
            ctx.beginPath(); ctx.roundRect(440, 175, 160, 35, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px Inter';
            ctx.fillText("Execute (Precise Fire)", 460, 197);

            // Check icon
            ctx.fillStyle = '#22c55e';
            ctx.font = '11px Inter';
            ctx.fillText("✓ 영속성 & 클러스터링 지원", 445, 225);
        };

        const notifyHeight = () => {
            const height = document.documentElement.scrollHeight;
            window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
        };

        window.onload = () => {
            drawCanvas();
            notifyHeight();
            new ResizeObserver(notifyHeight).observe(document.body);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { 
    margin: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background-color: transparent; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  canvas { 
    background-color: #1e1e1e; 
    border-radius: 8px; 
    border: 1px solid #333; 
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<canvas id="gcCanvas" width="600" height="240"></canvas>
<script>
  const canvas = document.getElementById('gcCanvas');
  const ctx = canvas.getContext('2d');
  
  const drawRegions = () => {
    ctx.clearRect(0, 0, 600, 240);
    
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#e0e0e0';
    ctx.fillText('Before Tuning (Small Regions, Humongous Allocation)', 20, 25);
    
    // Normal Regions (e.g. 4MB)
    ctx.fillStyle = '#2d2d2d';
    ctx.strokeStyle = '#555';
    for(let i=0; i<9; i++) {
        ctx.fillRect(20 + i*60, 40, 55, 55);
        ctx.strokeRect(20 + i*60, 40, 55, 55);
    }
    
    // Humongous Object (Spanning 3 regions = 12MB limit)
    ctx.fillStyle = 'rgba(187, 134, 252, 0.4)'; // Accent color
    ctx.fillRect(20 + 2*60, 40, 55*3 + 10, 55);
    ctx.strokeStyle = '#BB86FC';
    ctx.strokeRect(20 + 2*60, 40, 55*3 + 10, 55);
    ctx.fillStyle = '#BB86FC';
    ctx.font = '12px Arial';
    ctx.fillText('Humongous Object (10MB)', 20 + 2*60 + 10, 72);
    ctx.fillText('Fragmented!', 20 + 2*60 + 10, 88);

    // After Tuning (Larger Regions)
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#e0e0e0';
    ctx.fillText('After Tuning (Region Size: 32MB)', 20, 135);

    // Normal Regions (e.g. 32MB)
    ctx.fillStyle = '#2d2d2d';
    ctx.strokeStyle = '#555';
    for(let i=0; i<4; i++) {
        ctx.fillRect(20 + i*130, 150, 120, 60);
        ctx.strokeRect(20 + i*130, 150, 120, 60);
    }
    
    // Fits in one region now
    ctx.fillStyle = 'rgba(3, 218, 198, 0.4)'; // Secondary accent
    ctx.fillRect(20 + 1*130, 150, 90, 60);
    ctx.strokeStyle = '#03DAC6';
    ctx.strokeRect(20 + 1*130, 150, 90, 60);
    ctx.fillStyle = '#03DAC6';
    ctx.font = '12px Arial';
    ctx.fillText('Normal (10MB)', 20 + 1*130 + 5, 185);

  };
  
  const notifyHeight = () => {
    const height = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
  };

  window.onload = () => {
    drawRegions();
    notifyHeight();
    new ResizeObserver(notifyHeight).observe(document.body);
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 420px;
        }
        .canvas-container {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="canvas3" width="700" height="360"></canvas>
    </div>

    <script>
        const drawCanvas = () => {
            const c = document.getElementById('canvas3');
            const ctx = c.getContext('2d');

            // Title
            ctx.font = 'bold 18px Inter, Arial';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('Optimized: Distributed Execution (Sharding)', 20, 30);
            ctx.font = '13px Inter';
            ctx.fillStyle = '#888';
            ctx.fillText('등록/실행 역할 분리 + 쿼리 파티셔닝 기반 균등 분배', 20, 52);

            // Registration Master
            ctx.fillStyle = 'rgba(34, 197, 94, 0.1)';
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(250, 70, 200, 50, 10); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#22c55e';
            ctx.font = 'bold 14px Inter';
            ctx.fillText('등록 엔진 (Master)', 290, 100);

            // Arrow Master -> DB
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(350, 120); ctx.lineTo(350, 150); ctx.stroke();
            ctx.beginPath(); ctx.fillStyle = '#475569'; ctx.moveTo(350, 155); ctx.lineTo(346, 148); ctx.lineTo(354, 148); ctx.fill();

            // Label: Upsert
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px Inter';
            ctx.fillText('Upsert Schedule', 360, 140);

            // Shared DB
            ctx.fillStyle = 'rgba(168, 85, 247, 0.1)';
            ctx.strokeStyle = '#a855f7';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(260, 155, 180, 55, 10); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#a855f7';
            ctx.font = 'bold 13px Inter';
            ctx.fillText('Shared Job DB', 305, 185);

            // Workers
            const workers = [
                { label: "실행 엔진 1", cond: "ID % 4 = 0", pct: "25%" },
                { label: "실행 엔진 2", cond: "ID % 4 = 1", pct: "25%" },
                { label: "실행 엔진 3", cond: "ID % 4 = 2", pct: "25%" },
                { label: "실행 엔진 4", cond: "ID % 4 = 3", pct: "25%" }
            ];

            workers.forEach((w, i) => {
                const x = 25 + i * 170;
                const y = 260;

                // Worker box
                ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.roundRect(x, y, 145, 65, 8); ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 12px Inter';
                ctx.fillText(w.label, x + 30, y + 25);
                ctx.font = '11px Inter';
                ctx.fillStyle = '#94a3b8';
                ctx.fillText(w.cond, x + 42, y + 42);

                // Percentage badge
                ctx.fillStyle = 'rgba(34, 197, 94, 0.2)';
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.roundRect(x + 52, y + 48, 40, 16, 4); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 10px Inter';
                ctx.fillText(w.pct, x + 62, y + 60);

                // Lines from DB to Workers
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(350, 210);
                ctx.lineTo(x + 72, y);
                ctx.stroke();
                ctx.setLineDash([]);
            });

            // Bottom caption
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'italic 12px Inter';
            ctx.fillText('✓ Perfect Load Balancing via Query Partitioning', 215, 348);
        };

        const notifyHeight = () => {
            const height = document.documentElement.scrollHeight;
            window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
        };

        window.onload = () => {
            drawCanvas();
            notifyHeight();
            new ResizeObserver(notifyHeight).observe(document.body);
        };
    </script>
</body>
</html>
